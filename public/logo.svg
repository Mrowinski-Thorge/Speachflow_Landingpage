<svg xmlns="http://www.w3.org/2000/svg" width="260" height="60" viewBox="0 0 260 60" role="img" aria-labelledby="title desc">
  <title id="title">SpeachFlow Logo</title>
  <desc id="desc">Rounded badge with signal bars and the word SpeachFlow</desc>
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,6)">
    <rect x="0" y="0" width="60" height="48" rx="16" fill="url(#glow)" opacity="0.9"/>
    <rect x="10" y="12" width="8" height="24" rx="4" fill="white" opacity="0.8"/>
    <rect x="24" y="6" width="8" height="36" rx="4" fill="white" opacity="0.9"/>
    <rect x="38" y="16" width="8" height="26" rx="4" fill="white" opacity="0.85"/>
    <circle cx="30" cy="24" r="22" fill="none" stroke="white" stroke-opacity="0.35" stroke-width="2"/>
  </g>
  <text x="78" y="36" fill="url(#textGradient)" font-size="24" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="800" letter-spacing="-0.02em">
    SpeachFlow
  </text>
</svg>
